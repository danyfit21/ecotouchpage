<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:"Comfortaa","Segoe UI",system-ui,sans-serif;background:var(--gris-50);padding:24px;box-sizing:border-box;display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  .card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;box-shadow:var(--shadow-sm)}
  .ico{width:42px;height:42px;border-radius:12px;background:var(--eco-gradient);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
  .ico img{width:26px;height:26px}
  h4{font-family:"Comfortaa","Segoe UI",system-ui,sans-serif;font-weight:700;font-size:16px;color:var(--fg-strong);margin:0 0 6px}
  p{font-size:12.5px;color:var(--fg-muted);line-height:1.5;margin:0}
  .stat .n{font-size:38px;font-weight:700;color:var(--accent);line-height:1}
  .stat .c{font-size:12px;color:var(--fg-muted);margin-top:4px}
  .dark{background:var(--eco-azul-oscuro);border:0;color:#fff}
  .dark h4{color:#fff}.dark p{color:#bcd3e8}
</style>
</head>
<body>
  <div class="card">
    <div class="ico"><img src="../assets/isotipo-mono-2.png" alt=""></div>
    <h4>Pantallas interactivas</h4>
    <p>Transforma aulas y salas de reunión con tecnología táctil.</p>
  </div>
  <div class="card stat">
    <div class="n">+700</div>
    <div class="c">Pantallas entregadas</div>
    <div style="height:1px;background:var(--gris-100);margin:14px 0"></div>
    <div class="n" style="color:var(--accent-2-ink)">+40</div>
    <div class="c">Instituciones atendidas</div>
  </div>
  <div class="card dark">
    <h4>Energía solar</h4>
    <p>Evaluación técnica, presupuesto y ejecución para empresas e instituciones.</p>
    <div style="margin-top:14px;display:inline-block;background:var(--accent-2);color:#063a26;font-weight:700;font-size:12px;padding:6px 14px;border-radius:999px">Cotizar</div>
  </div>
</body>
</html>

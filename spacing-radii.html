<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:"Comfortaa","Segoe UI",system-ui,sans-serif;background:var(--bg);padding:24px;box-sizing:border-box;display:flex;gap:14px;align-items:flex-end}
  .b{flex:1;background:var(--gris-100);border:1px solid var(--border)}
  .b div{height:64px;background:var(--eco-gradient);border:1px solid rgba(0,47,86,.08)}
  .l{text-align:center;font-size:11px;color:var(--fg-strong);font-weight:700;margin-top:8px}
  .l small{display:block;font-weight:400;color:var(--fg-subtle);font-size:10px;margin-top:1px}
  .col{flex:1}
</style>
</head>
<body>
  <div class="col"><div style="background:var(--gris-100)"><div style="border-radius:4px"></div></div><div class="l">xs<small>4px</small></div></div>
  <div class="col"><div style="background:var(--gris-100)"><div style="border-radius:8px"></div></div><div class="l">sm<small>8px</small></div></div>
  <div class="col"><div style="background:var(--gris-100)"><div style="border-radius:14px"></div></div><div class="l">md<small>14px</small></div></div>
  <div class="col"><div style="background:var(--gris-100)"><div style="border-radius:22px"></div></div><div class="l">lg<small>22px</small></div></div>
  <div class="col"><div style="background:var(--gris-100)"><div style="border-radius:32px"></div></div><div class="l">xl<small>32px</small></div></div>
  <div class="col"><div style="background:var(--gris-100)"><div style="border-radius:999px"></div></div><div class="l">pill<small>999px</small></div></div>
</body>
</html>

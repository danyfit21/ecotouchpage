<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:"Comfortaa","Segoe UI",system-ui,sans-serif;background:var(--bg);padding:24px 26px;box-sizing:border-box;color:var(--fg-strong)}
  .r{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--gris-100)}
  .r:last-child{border-bottom:0}
  .t{flex:none;width:64px;font-size:11px;color:var(--fg-subtle);font-variant-numeric:tabular-nums}
  .s{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
</style>
</head>
<body>
  <div class="r"><span class="t">61 / 5xl</span><span class="s" style="font-size:61px;font-weight:700;line-height:1">Transforma</span></div>
  <div class="r"><span class="t">39 / 3xl</span><span class="s" style="font-size:39px;font-weight:700">Tecnología sin complicaciones</span></div>
  <div class="r"><span class="t">25 / xl</span><span class="s" style="font-size:25px;font-weight:700">El puente a tus ideas</span></div>
  <div class="r"><span class="t">20 / lg</span><span class="s" style="font-size:20px;font-weight:300">Soluciones innovadoras y sostenibles</span></div>
  <div class="r"><span class="t">16 / base</span><span class="s" style="font-size:16px;font-weight:400;color:var(--fg)">Cuerpo de texto en Comfortaa Regular para párrafos.</span></div>
  <div class="r"><span class="t">14 / sm</span><span class="s" style="font-size:14px;font-weight:400;color:var(--fg-muted)">Texto secundario y apoyos.</span></div>
  <div class="r"><span class="t">12 / xs</span><span class="s" style="font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)">Overline · etiqueta</span></div>
</body>
</html>

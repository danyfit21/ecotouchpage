<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:"Comfortaa","Segoe UI",system-ui,sans-serif;background:var(--bg);padding:22px;box-sizing:border-box}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .sw{border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border)}
  .chip{height:92px}
  .meta{padding:10px 12px}
  .name{font-weight:700;font-size:14px;color:var(--fg-strong)}
  .hex{font-size:12px;color:var(--fg-muted);margin-top:2px;font-variant-numeric:tabular-nums}
  .use{font-size:11px;color:var(--fg-subtle);margin-top:4px;line-height:1.3}
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#1cf799"></div><div class="meta"><div class="name">Verde</div><div class="hex">#1CF799</div><div class="use">Energía · sostenibilidad</div></div></div>
    <div class="sw"><div class="chip" style="background:#2b83ed"></div><div class="meta"><div class="name">Azul</div><div class="hex">#2B83ED</div><div class="use">Tecnología · acción</div></div></div>
    <div class="sw"><div class="chip" style="background:#002f56"></div><div class="meta"><div class="name">Azul oscuro</div><div class="hex">#002F56</div><div class="use">Texto · fondos</div></div></div>
    <div class="sw"><div class="chip" style="background:#e1e2e4"></div><div class="meta"><div class="name">Gris</div><div class="hex">#E1E2E4</div><div class="use">Superficies · líneas</div></div></div>
  </div>
</body>
</html>

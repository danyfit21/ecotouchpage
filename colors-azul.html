<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:"Comfortaa","Segoe UI",system-ui,sans-serif;background:var(--bg);padding:22px;box-sizing:border-box}
  .scale{display:flex;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border)}
  .step{flex:1;height:80px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-size:11px;font-weight:700}
  .lab{display:flex;margin-top:8px}
  .lab span{flex:1;text-align:center;font-size:10px;color:var(--fg-subtle);font-variant-numeric:tabular-nums}
  .title{font-size:13px;font-weight:700;color:var(--fg-strong);margin:0 0 10px;letter-spacing:.04em;text-transform:uppercase}
</style>
</head>
<body>
  <div class="title">Azul — escala (900 = azul oscuro de marca)</div>
  <div class="scale">
    <div class="step" style="background:#eaf3fe">50</div>
    <div class="step" style="background:#d0e3fc">100</div>
    <div class="step" style="background:#a3c8f8">200</div>
    <div class="step" style="background:#6ba6f2">300</div>
    <div class="step" style="background:#2b83ed;color:#fff">400</div>
    <div class="step" style="background:#1e6ed6;color:#fff">500</div>
    <div class="step" style="background:#1858b0;color:#fff">600</div>
    <div class="step" style="background:#14478c;color:#fff">700</div>
    <div class="step" style="background:#103a70;color:#fff">800</div>
    <div class="step" style="background:#002f56;color:#fff">900</div>
  </div>
  <div class="lab"><span>#eaf3fe</span><span></span><span></span><span></span><span>#2b83ed</span><span></span><span></span><span></span><span></span><span>#002f56</span></div>
</body>
</html>

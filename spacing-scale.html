<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:"Comfortaa","Segoe UI",system-ui,sans-serif;background:var(--bg);padding:24px;box-sizing:border-box}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:9px}
  .bar{height:18px;background:var(--eco-gradient);border-radius:5px}
  .k{width:78px;font-size:12px;font-weight:700;color:var(--fg-strong)}
  .px{font-size:11px;color:var(--fg-subtle);font-variant-numeric:tabular-nums}
</style>
</head>
<body>
  <div class="row"><span class="k">space-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row"><span class="k">space-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="k">space-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row"><span class="k">space-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row"><span class="k">space-5</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
  <div class="row"><span class="k">space-6</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
  <div class="row"><span class="k">space-7</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
  <div class="row"><span class="k">space-8</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
  <div class="row"><span class="k">space-9</span><div class="bar" style="width:96px"></div><span class="px">96px</span></div>
</body>
</html>

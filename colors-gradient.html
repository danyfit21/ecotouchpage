<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:"Comfortaa","Segoe UI",system-ui,sans-serif;background:var(--bg);padding:22px;box-sizing:border-box;display:flex;gap:16px}
  .g{flex:1;border-radius:var(--radius-md);height:128px;display:flex;align-items:flex-end;padding:12px;box-sizing:border-box;color:#fff;font-weight:700;font-size:12px;text-shadow:0 1px 4px rgba(0,0,0,.25)}
  .cap{font-size:10px;font-weight:400;opacity:.92;margin-top:2px}
</style>
</head>
<body>
  <div class="g" style="background:linear-gradient(135deg,#1cf799 0%,#2b83ed 100%)">--eco-gradient<div class="cap">verde → azul · 135° · gradiente de marca (isotipo)</div></div>
  <div class="g" style="background:linear-gradient(135deg,#5bf9b3 0%,#5ba3f2 100%)">--eco-gradient-soft<div class="cap">versión clara</div></div>
  <div class="g" style="background:linear-gradient(135deg,#14c97b 0%,#1e62c4 100%)">--eco-gradient-deep<div class="cap">versión profunda</div></div>
</body>
</html>

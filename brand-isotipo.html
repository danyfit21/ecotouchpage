<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:"Comfortaa","Segoe UI",system-ui,sans-serif;background:var(--bg);padding:20px;box-sizing:border-box;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .t{border-radius:var(--radius-md);height:120px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border)}
  .t img{width:72px;height:72px;object-fit:contain}
  .cap{font-size:11px;color:var(--fg-muted);text-align:center;margin-top:7px}
</style>
</head>
<body>
  <div><div class="t" style="background:#fff"><img src="../assets/isotipo-color.png" alt="isotipo color"></div><div class="cap">Color (primario)</div></div>
  <div><div class="t" style="background:#fff"><img src="../assets/isotipo-mono-2.png" alt="isotipo azul"></div><div class="cap">Mono azul</div></div>
  <div><div class="t" style="background:#f6f7f9"><img src="../assets/isotipo-mono-3.png" alt="isotipo oscuro"></div><div class="cap">Mono azul oscuro</div></div>
  <div><div class="t" style="background:#002f56"><img src="../assets/isotipo-mono-4.png" alt="isotipo verde"></div><div class="cap">Mono verde</div></div>
</body>
</html>

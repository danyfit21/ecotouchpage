<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:"Comfortaa","Segoe UI",system-ui,sans-serif;background:var(--gris-50);padding:30px 24px 34px;box-sizing:border-box;display:flex;gap:22px;align-items:center;justify-content:space-between}
  .c{width:90px;height:74px;background:#fff;border-radius:14px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-size:11px;font-weight:700;color:var(--fg-strong)}
  .x{box-shadow:var(--shadow-xs)}
  .s{box-shadow:var(--shadow-sm)}
  .m{box-shadow:var(--shadow-md)}
  .l{box-shadow:var(--shadow-lg)}
  .a{box-shadow:var(--shadow-accent)}
  .v{box-shadow:var(--shadow-verde)}
</style>
</head>
<body>
  <div class="c x">xs</div>
  <div class="c s">sm</div>
  <div class="c m">md</div>
  <div class="c l">lg</div>
  <div class="c a" style="color:var(--accent)">accent</div>
  <div class="c v" style="color:var(--accent-2-ink)">verde</div>
</body>
</html>

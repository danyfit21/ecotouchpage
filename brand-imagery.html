<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:"Comfortaa","Segoe UI",system-ui,sans-serif;background:var(--bg);padding:18px;box-sizing:border-box;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .ph{border-radius:var(--radius-md);height:150px;overflow:hidden;border:1px solid var(--border);position:relative}
  .ph img{width:100%;height:100%;object-fit:cover}
  .cap{position:absolute;left:0;right:0;bottom:0;padding:8px 10px;background:linear-gradient(to top,rgba(0,47,86,.82),transparent);color:#fff;font-size:11px;font-weight:700}
</style>
</head>
<body>
  <div class="ph"><img src="../assets/product-pantalla-stand.png" alt=""><div class="cap">Pantalla interactiva</div></div>
  <div class="ph"><img src="../assets/scene-meeting.png" alt=""><div class="cap">Sala de reuniones</div></div>
  <div class="ph"><img src="../assets/scene-collaboration.png" alt=""><div class="cap">Colaboración en aula</div></div>
</body>
</html>

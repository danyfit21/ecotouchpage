<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:"Comfortaa","Segoe UI",system-ui,sans-serif;background:var(--bg);padding:18px;box-sizing:border-box;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .t{border-radius:var(--radius-md);height:88px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);padding:0 14px;box-sizing:border-box}
  .t img{max-width:88%;max-height:48px;object-fit:contain}
  .cap{font-size:10.5px;color:var(--fg-muted);text-align:center;margin-top:6px}
</style>
</head>
<body>
  <div><div class="t" style="background:#fff"><img src="../assets/logo-h-blanco.png" alt=""></div><div class="cap">Fondo blanco</div></div>
  <div><div class="t" style="background:#e1e2e4"><img src="../assets/logo-h-gris.png" alt=""></div><div class="cap">Fondo gris</div></div>
  <div><div class="t" style="background:#2b83ed"><img src="../assets/logo-h-azul.png" alt=""></div><div class="cap">Fondo azul</div></div>
  <div><div class="t" style="background:#002f56"><img src="../assets/logo-h-azuloscuro.png" alt=""></div><div class="cap">Fondo azul oscuro</div></div>
  <div><div class="t" style="background:#1cf799"><img src="../assets/logo-h-verde.png" alt=""></div><div class="cap">Fondo verde</div></div>
  <div><div class="t" style="background:#0c1822"><img src="../assets/logo-v-blanco.png" alt="" style="max-height:70px"></div><div class="cap">Vertical (blanco)</div></div>
</body>
</html>

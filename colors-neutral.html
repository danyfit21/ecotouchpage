<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:"Comfortaa","Segoe UI",system-ui,sans-serif;background:var(--bg);padding:22px;box-sizing:border-box}
  .scale{display:flex;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border)}
  .step{flex:1;height:80px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-size:11px;font-weight:700}
  .lab{display:flex;margin-top:8px}
  .lab span{flex:1;text-align:center;font-size:10px;color:var(--fg-subtle);font-variant-numeric:tabular-nums}
  .title{font-size:13px;font-weight:700;color:var(--fg-strong);margin:0 0 10px;letter-spacing:.04em;text-transform:uppercase}
</style>
</head>
<body>
  <div class="title">Neutros / Gris — escala (200 = gris de marca)</div>
  <div class="scale">
    <div class="step" style="background:#ffffff;color:#585e67">0</div>
    <div class="step" style="background:#f6f7f9;color:#585e67">50</div>
    <div class="step" style="background:#eef0f2;color:#585e67">100</div>
    <div class="step" style="background:#e1e2e4;color:#585e67">200</div>
    <div class="step" style="background:#cdd0d4;color:#3c424b">300</div>
    <div class="step" style="background:#a9aeb5;color:#fff">400</div>
    <div class="step" style="background:#7e848d;color:#fff">500</div>
    <div class="step" style="background:#585e67;color:#fff">600</div>
    <div class="step" style="background:#3c424b;color:#fff">700</div>
    <div class="step" style="background:#1f2a36;color:#fff">800</div>
    <div class="step" style="background:#0c1822;color:#fff">900</div>
  </div>
  <div class="lab"><span>#fff</span><span></span><span></span><span>#e1e2e4</span><span></span><span></span><span></span><span></span><span></span><span></span><span>#0c1822</span></div>
</body>
</html>

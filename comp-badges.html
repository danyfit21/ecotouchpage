<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:"Comfortaa","Segoe UI",system-ui,sans-serif;background:var(--bg);padding:26px;box-sizing:border-box;display:flex;flex-wrap:wrap;gap:12px;align-content:flex-start}
  .badge{font-size:12px;font-weight:700;padding:6px 14px;border-radius:999px;display:inline-flex;align-items:center;gap:7px}
  .b-azul{background:rgba(43,131,237,.12);color:var(--azul-600)}
  .b-verde{background:rgba(28,247,153,.18);color:var(--verde-700)}
  .b-grad{background:var(--eco-gradient);color:#fff}
  .b-gris{background:var(--gris-100);color:var(--fg-strong)}
  .b-dark{background:var(--eco-azul-oscuro);color:#fff}
  .b-out{background:#fff;border:1.5px solid var(--accent);color:var(--accent)}
  .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
  .b-ok{background:rgba(14,168,104,.14);color:var(--success)}
</style>
</head>
<body>
  <span class="badge b-grad">Innovación</span>
  <span class="badge b-azul">Tecnología educativa</span>
  <span class="badge b-verde">Sostenible</span>
  <span class="badge b-ok"><span class="dot"></span>Garantía activa</span>
  <span class="badge b-dark">Energía solar</span>
  <span class="badge b-gris">Importación</span>
  <span class="badge b-out">Cotización</span>
  <span class="badge b-azul">Soporte 24h</span>
  <span class="badge b-verde">Capacitación gratis</span>
  <span class="badge b-gris">+700 pantallas</span>
</body>
</html>
